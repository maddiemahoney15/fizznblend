<!DOCTYPE html>

  <title>Substitution List</title>
  <link rel="stylesheet" href="css/substitutions.css">

<body>

<section class="substitutions">

  <h1>Substitution list</h1>

  <div class="group">
    <h2>Milk</h2>
    <p>almond, oat, coconut, soy, water or orange juice for fruity smoothies</p>
  </div>

  <div class="group">
    <h2>Greek yogurt</h2>

  </div>

  <div class="group">
    <h2>Honey</h2>
    <p>agave, stevia, dates</p>
  </div>

</section>
